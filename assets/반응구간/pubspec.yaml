name: fulink_pro_ultra
description: Fulink Pro ULTRA (cion)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 네 앱 핵심
  http: ^1.2.2
  web_socket_channel: ^3.0.3
  intl: ^0.19.0

  # 파일/이미지
  image_picker: ^1.1.2
  file_picker: ^8.0.7

  # 저장/로그
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0

  # 권한/알림/백그라운드(필요시)
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.2
  flutter_background_service: ^5.0.6
  flutter_background_service_android: ^6.2.3

  # CSV
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/data/
